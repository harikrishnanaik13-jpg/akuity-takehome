apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  template:
    spec:
      volumes:
        - name: custom-tools
          emptyDir: {}
      initContainers:
        - name: download-custom-helm
          image: alpine:3.20
          command: [sh, -c]
          args:
            - |
              set -e
              apk add --no-cache curl tar gzip
              HELM_VERSION="v3.15.4"
              curl -L "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
              tar -xzf /tmp/helm.tar.gz -C /tmp
              mv /tmp/linux-amd64/helm /custom-tools/helm
              chmod +x /custom-tools/helm
          volumeMounts:
            - mountPath: /custom-tools
              name: custom-tools
      containers:
        - name: argocd-repo-server
          volumeMounts:
            - mountPath: /usr/local/bin/helm
              name: custom-tools
              subPath: helm
